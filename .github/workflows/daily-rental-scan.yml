name: Daily rental scan

on:
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Use test for a small sample, full for the uncapped scanner."
        required: true
        default: "test"
        type: choice
        options:
          - test
          - full
  schedule:
    # GitHub schedules use UTC and can be delayed or occasionally skipped.
    # Run hourly through the afternoon; the Python script records last_scan_date
    # and sends at most once per London day after 12:00.
    - cron: "0 11-18 * * *"

permissions:
  contents: write

concurrency:
  group: daily-rental-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install playwright
          python3 -m playwright install chromium

      - name: Run rental scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SCAN_BACKEND: playwright
          PLAYWRIGHT_SEARCH_PAUSE_MIN_MS: 2500
          PLAYWRIGHT_SEARCH_PAUSE_MAX_MS: 5500
          PLAYWRIGHT_DETAIL_PAUSE_MIN_MS: 1200
          PLAYWRIGHT_DETAIL_PAUSE_MAX_MS: 3200
          PLAYWRIGHT_BLOCK_RETRY_PAUSE_MS: 15000
          PLAYWRIGHT_SEARCH_RETRIES: 1
          PLAYWRIGHT_BLOCK_HEAVY_RESOURCES: true
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.scan_mode }}" = "full" ]; then
              python3 telegram_bot.py --scan-now
            else
              python3 telegram_bot.py --test-scan-now
            fi
          else
            python3 telegram_bot.py --daily-scan
          fi

      - name: Save sent-listing memory
        run: |
          if ! git diff --quiet -- scanner_state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scanner_state.json
            git commit -m "Update rental scan state"
            git pull --rebase --autostash
            git push
          fi
